<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Login</title>

  <link rel="stylesheet"
    href="style.css">

</head>

<body>

  <div class="auth-container">

    <h1>🔐 Login</h1>

    <input type="text"
      id="login-username"
      placeholder="Username">

    <input type="password"
      id="login-password"
      placeholder="Password">

    <button onclick="login()">
      Login
    </button><br><br>

    <p>

      Don't have account?

      <a href="register.html">
        Register
      </a>

    </p>

  </div>

  <script src="auth.js"></script>

</body>

</html>
