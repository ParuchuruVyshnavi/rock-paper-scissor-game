<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Register</title>

  <link rel="stylesheet"
    href="style.css">

</head>

<body>

  <div class="auth-container">

    <h1>📝 Register</h1>

   

    <img id="preview"
      src=""
      alt="Profile Preview"
      width="100"
      height="100"
      style="
        border-radius:50%;
        object-fit:cover;
        margin-bottom:15px;
        border:3px solid gold;
      ">

    

    <input type="text"
      id="reg-username"
      placeholder="Username">

    

    <input type="email"
      id="reg-email"
      placeholder="Email">

    

    <input type="password"
      id="reg-password"
      placeholder="Password">

    

    <input type="password"
      id="confirm-password"
      placeholder="Confirm Password">

    

    <input type="file"
      id="profile-pic"
      accept="image/*">

    <br><br>

   

    <button onclick="verifyEmail()">

      📧 Verify Email

    </button>

    <br><br>

    

    <button onclick="register()">

      ✅ Register

    </button>

    <br><br>

    <p>

      Already have account?

      <a href="index.html">

        Login

      </a>

    </p>

  </div>

  <script src="auth.js"></script>

</body>

</html>
